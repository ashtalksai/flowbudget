<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" fill="none">
  <!-- FlowBudget Logo - Primary (Wordmark + Icon) -->
  <!-- Wave/flow motif representing income smoothing -->
  
  <!-- Icon: Abstract wave flowing into a circle (coin/budget) -->
  <circle cx="28" cy="30" r="26" fill="#0D9488"/>
  <path d="M10 30 C16 20, 22 38, 28 28 C34 18, 40 36, 46 26" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M14 36 C20 26, 26 44, 32 34 C38 24, 44 42, 50 32" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.7"/>
  
  <!-- Dollar sign subtle overlay -->
  <text x="28" y="36" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#F8FAFC" text-anchor="middle" opacity="0.3">$</text>
  
  <!-- Wordmark -->
  <text x="66" y="24" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#1E293B">
    <tspan fill="#0D9488">Flow</tspan><tspan fill="#1E293B">Budget</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="66" y="44" font-family="Inter, sans-serif" font-size="11" font-weight="400" fill="#64748B" letter-spacing="0.5">
    Smooth your income. Own your cash flow.
  </text>
</svg>
